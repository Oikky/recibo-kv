<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K&V Easy Traveling — Recibo</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1a3a5c;
  --primary-light: #1e4a7a;
  --accent: #e8a020;
  --bg: #0c1520;
  --bg2: #111d2a;
  --bg3: #162030;
  --border: #1e2e40;
  --text: #e0e8f0;
  --text2: #7a9ab5;
  --text3: #4a6a85;
  --success: #1a7a3a;
  --loc-bg: #1e3f6e;
  --bag-bg: #2a1f00;
  --bag-border: #c8860a;
  --bag-text: #f0c060;
  --info-bg: #0a1e30;
  --info-border: #1a4a70;
  --valor-bg: #1a3a5c;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ─── LAYOUT ─── */
.app { display: flex; min-height: 100vh; }

/* ─── SIDEBAR ─── */
.sidebar {
  width: 320px; min-width: 320px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 1.25rem;
  display: flex; flex-direction: column; gap: .85rem;
  overflow-y: auto; height: 100vh; position: sticky; top: 0;
}

.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 12px; border-bottom: 1px solid var(--border);
}
.sidebar-logo span { font-size: 13px; font-weight: 600; color: var(--text); }
.sidebar-logo small { display: block; font-size: 10px; color: var(--text2); font-weight: 300; }

.sb-section {
  font-size: 10px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .1em;
  padding-bottom: 5px; border-bottom: 1px solid var(--border);
}

.fl { display: flex; flex-direction: column; gap: 4px; }
.fl label { font-size: 11px; color: var(--text2); }
.fl input, .fl textarea, .fl select {
  font-size: 12px; padding: 7px 9px;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg3); color: var(--text);
  width: 100%; font-family: 'Sora', sans-serif;
  transition: border-color .15s;
}
.fl input:focus, .fl textarea:focus { outline: none; border-color: var(--primary-light); }
.fl textarea { resize: vertical; min-height: 50px; }

.paste-box {
  border: 1.5px dashed #1a4a70;
  border-radius: 8px; padding: 10px;
  background: var(--bg3);
}
.paste-box label { font-size: 11px; color: #5a9fd4; display: block; margin-bottom: 5px; font-weight: 500; }
.paste-box textarea {
  font-size: 11px;
  min-height: calc(100vh / 3);
  max-height: none;
  overflow: hidden;
  border: 1px solid var(--border); border-radius: 5px;
  background: var(--bg); color: #c8d8e8;
  width: 100%; padding: 7px 8px;
  font-family: 'JetBrains Mono', monospace; resize: none;
}

.btn-primary {
  width: 100%; padding: 9px; font-size: 12px;
  border: none; border-radius: 6px;
  background: var(--primary-light); color: #fff;
  cursor: pointer; font-weight: 600; font-family: 'Sora', sans-serif;
  transition: background .15s;
}
.btn-primary:hover { background: #1a5ca8; }

.btn-secondary {
  width: 100%; padding: 8px; font-size: 11px;
  border: 1px solid var(--border); border-radius: 6px;
  background: transparent; color: var(--text2);
  cursor: pointer; font-family: 'Sora', sans-serif;
  transition: all .15s;
}
.btn-secondary:hover { border-color: var(--primary-light); color: var(--text); }

.btn-export {
  width: 100%; padding: 12px; font-size: 13px;
  border: none; border-radius: 8px;
  background: linear-gradient(135deg, var(--primary) 0%, #1a5ca8 100%);
  color: #fff; cursor: pointer; font-weight: 700;
  font-family: 'Sora', sans-serif;
  margin-top: auto; letter-spacing: .03em;
  box-shadow: 0 4px 16px rgba(26,60,92,.5);
  transition: opacity .15s;
}
.btn-export:hover { opacity: .9; }

.msg {
  font-size: 11px; padding: 6px 9px; border-radius: 5px; display: none;
  font-family: 'JetBrains Mono', monospace;
}
.msg.ok { background: #0a2a0a; color: #6fcf6f; border: 1px solid #1a5a1a; }
.msg.err { background: #2a0a0a; color: #cf6f6f; border: 1px solid #5a1a1a; }

/* Config tabs */
.tabs { display: flex; gap: 4px; }
.tab {
  flex: 1; padding: 6px; font-size: 11px; border-radius: 5px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text2); cursor: pointer; font-family: 'Sora', sans-serif;
  transition: all .15s;
}
.tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.tab-panel { display: none; }
.tab-panel.active { display: flex; flex-direction: column; gap: .7rem; }

/* Color picker row */
.color-row { display: flex; align-items: center; gap: 8px; }
.color-row label { flex: 1; font-size: 11px; color: var(--text2); }
.color-row input[type=color] {
  width: 36px; height: 28px; padding: 2px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--bg3); cursor: pointer;
}

.logo-upload {
  border: 1px dashed var(--border); border-radius: 6px; padding: 8px;
  text-align: center; cursor: pointer; font-size: 11px; color: var(--text2);
  background: var(--bg3); transition: border-color .15s;
}
.logo-upload:hover { border-color: var(--primary-light); }

/* pass list */
.pass-list { display: flex; flex-direction: column; gap: 4px; }
.pass-item {
  display: flex; gap: 5px; align-items: center;
}
.pass-item input { flex: 1; }
.pass-item button {
  padding: 6px 8px; border: 1px solid var(--border);
  border-radius: 5px; background: transparent; color: var(--text3);
  cursor: pointer; font-size: 12px;
}
.pass-item button:hover { color: #cf6f6f; border-color: #5a1a1a; }

/* ─── PREVIEW ─── */
.preview-area {
  flex: 1; padding: 2rem;
  background: #080f18;
  display: flex; flex-direction: column; align-items: center;
  overflow-y: auto;
}

/* ─── RECIBO ─── */
#recibo {
  width: 680px; background: #fff; color: #111;
  font-family: 'Sora', sans-serif; font-size: 13px;
  padding: 32px 36px; border-radius: 10px;
  box-shadow: 0 8px 40px rgba(0,0,0,.5);
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
  color-adjust: exact;
}

.rec-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; padding-bottom: 16px;
  border-bottom: 3px solid var(--r-primary, #1a3a5c);
}
.rec-logo-area { display: flex; align-items: center; gap: 14px; }
#logo-img-wrap img, #logo-img-wrap .logo-ph {
  width: 72px; height: 72px; object-fit: cover; border-radius: 8px; display: block;
}
#logo-img-wrap .logo-ph {
  background: linear-gradient(135deg, #1a3a5c 60%, #e8a020 100%);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 9px; font-weight: 700; text-align: center; line-height: 1.4;
}
.rec-company h1 { font-size: 20px; font-weight: 700; color: var(--r-primary, #1a3a5c); }
.rec-slogan {
  font-size: 10px; color: #555; margin-top: 3px;
  border: .5px solid #ccc; border-radius: 4px; padding: 3px 8px; display: inline-block;
}
.rec-tel { font-size: 10px; color: #888; margin-top: 4px; }
.rec-cnpj { text-align: right; font-size: 11px; color: #555; }
.rec-cnpj strong { color: var(--r-primary, #1a3a5c); font-size: 12px; display: block; }

/* blocos genéricos */
.bloco {
  border: 1px solid #d0d8e4; border-radius: 8px;
  padding: 11px 15px; margin-bottom: 12px;
  background: #f7f9fc;
  break-inside: avoid; page-break-inside: avoid;
}
.bloco-titulo {
  font-weight: 700; font-size: 13px; color: var(--r-primary, #1a3a5c);
  margin-bottom: 5px; display: flex; align-items: center; gap: 6px;
}
.bloco p { color: #333; font-size: 12px; line-height: 1.8; }

/* passageiro */
.bloco-pass p { font-size: 13px; font-weight: 500; }

/* localizador geral */
.bloco-loc {
  background: var(--r-loc-bg, #1e3f6e) !important;
  border-color: var(--r-loc-bg, #1e3f6e) !important;
}
.bloco-loc .bloco-titulo { color: rgba(255,255,255,.7) !important; font-size: 11px !important; font-weight: 500 !important; }
.bloco-loc p { color: #fff !important; font-size: 14px !important; font-weight: 700 !important; }

/* trecho */
.trecho {
  background: #fff; border: 1px solid #d0d8e4; border-radius: 8px;
  padding: 12px 15px; margin-bottom: 12px;
  break-inside: avoid; page-break-inside: avoid;
}
.trecho-titulo {
  font-weight: 700; font-size: 14px; color: var(--r-primary, #1a3a5c);
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1px solid #e8eef5;
}

/* localizador específico + cia aérea na mesma linha */
.loc-cia-row {
  display: flex; justify-content: space-between; align-items: center;
  gap: 8px; margin-bottom: 10px; flex-wrap: wrap;
}
.loc-esp-bloco {
  background: var(--r-loc-bg, #1e3f6e);
  border-radius: 6px; padding: 7px 12px;
  display: inline-flex; align-items: center; gap: 8px;
}
.loc-esp-label { font-size: 10px; color: rgba(255,255,255,.6); font-weight: 500; }
.loc-esp-val { font-size: 13px; color: #fff; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

.cia-bloco {
  border: 1px solid var(--r-loc-bg, #1e3f6e);
  border-radius: 6px; padding: 7px 12px;
  display: inline-flex; align-items: center; gap: 8px;
}
.cia-label { font-size: 10px; color: var(--r-loc-bg, #1e3f6e); font-weight: 500; }
.cia-val { font-size: 13px; color: var(--r-loc-bg, #1e3f6e); font-weight: 700; }

/* grid partida/destino */
.trecho-cols {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px 20px; margin-bottom: 10px;
}
.tcol { display: flex; flex-direction: column; gap: 5px; }
.tcol-header {
  font-size: 10px; font-weight: 700; color: var(--r-primary, #1a3a5c);
  text-transform: uppercase; letter-spacing: .06em;
  padding-bottom: 4px; border-bottom: 2px solid var(--r-primary, #1a3a5c);
  margin-bottom: 3px;
}
.trow { display: flex; flex-direction: column; }
.trow-label { font-size: 10px; color: #888; }
.trow-val { font-size: 12px; color: #222; font-weight: 600; }

/* linha inferior do trecho — coluna vertical */
.trecho-bottom {
  display: flex; flex-direction: column; gap: 0;
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid #e8eef5;
}
/* cabeçalho Paradas | Duração — mesmo grid que trecho-cols */
.tbot-header {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px 20px;
  padding: 4px 0 6px;
  border-bottom: 1px solid #d0d8e4;
  margin-bottom: 4px;
}
.tbot-header-label {
  font-size: 10px; font-weight: 700; color: #1a3a5c;
  text-transform: uppercase; letter-spacing: .06em;
}
/* linhas de parada — mesmo grid */
.tbot-parada-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px 20px;
  padding: 3px 0;
}
.tbot-parada-row + .tbot-parada-row { border-top: .5px solid #f0f0f0; }
.tbot-parada-local { font-size: 12px; color: #222; font-weight: 500; }
.tbot-parada-dur { font-size: 12px; color: #555; }
/* duração total da viagem — mesmo grid que paradas */
.tbot-total {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px 20px;
  margin-top: 8px; padding-top: 8px;
  border-top: 1px solid #d0d8e4;
}
.tbot-total-label { font-size: 10px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
.tbot-total-val { font-size: 13px; color: #1a3a5c; font-weight: 700; }
.tbot-direto { font-size: 12px; color: #555; padding: 4px 0; }
.tbot-item { display: flex; flex-direction: column; gap: 2px; padding: 4px 0; }
.tbot-label { font-size: 10px; color: #888; }
.tbot-val { font-size: 12px; color: #222; font-weight: 600; }

/* bagagem específica dentro do trecho */
.bag-esp {
  padding: 8px 11px;
  background: var(--r-bag-esp-bg, #f0f4fa);
  border-radius: 6px;
  border-left: 3px solid var(--r-bag-esp-border, #1a3a5c);
}
.bag-esp-titulo { font-size: 10px; font-weight: 700; color: var(--r-bag-esp-border, #1a3a5c); margin-bottom: 4px; }
.bag-esp ul { list-style: none; }
.bag-esp li { font-size: 11px; color: #333; line-height: 1.75; }
.bag-esp li::before { content: "✓ "; color: var(--r-bag-esp-border, #1a3a5c); font-weight: 700; }

/* bagagem geral */
.bloco-bag {
  background: var(--r-bag-bg, #fff8ee) !important;
  border-color: var(--r-bag-border, #e8c97a) !important;
}
.bloco-bag .bloco-titulo { color: var(--r-bag-text, #8a6000) !important; }
.bloco-bag ul { list-style: none; }
.bloco-bag li { font-size: 12px; color: #333; line-height: 1.85; }
.bloco-bag li::before { content: "✓ "; color: var(--r-bag-text, #8a6000); font-weight: 700; }

/* informações */
.bloco-info {
  background: var(--r-info-bg, #f0f7ff) !important;
  border-color: var(--r-info-border, #b0cff5) !important;
}
.bloco-info .bloco-titulo { color: var(--r-primary, #1a3a5c) !important; }
.bloco-info p { white-space: pre-wrap; font-size: 12px; color: #333; line-height: 1.75; }

/* valor */
.bloco-valor {
  background: var(--r-primary, #1a3a5c) !important;
  border-color: var(--r-primary, #1a3a5c) !important;
  display: flex; justify-content: space-between; align-items: center;
}
.bloco-valor .bloco-titulo { color: rgba(255,255,255,.7) !important; margin-bottom: 0; font-size: 11px !important; font-weight: 500 !important; }
.valor-num { font-size: 24px; font-weight: 700; color: #fff; font-family: 'JetBrains Mono', monospace; }

/* hospedagem — Modelo A */
.hospedagem {
  background: #fff; border: 1px solid #d0d8e4; border-radius: 8px;
  padding: 12px 15px; margin-bottom: 12px;
  break-inside: avoid; page-break-inside: avoid;
}
.hosp-titulo {
  font-weight: 700; font-size: 13px; color: #1a3a5c;
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1px solid #e8eef5;
}
.hosp-conf {
  display: inline-flex; align-items: center; gap: 8px;
  border: 1.5px solid #1a3a5c; border-radius: 6px;
  padding: 5px 12px; margin-bottom: 10px;
}
.hosp-conf-label { font-size: 10px; color: #1a3a5c; font-weight: 600; letter-spacing: .06em; opacity: .6; }
.hosp-conf-val { font-size: 13px; color: #1a3a5c; font-weight: 700; font-family: 'Courier New', monospace; letter-spacing: .05em; }
.hosp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; margin-bottom: 6px; }
.hosp-item { display: flex; flex-direction: column; }
.hosp-full { grid-column: 1/-1; }
/* entrada | saída | vazia — 3 colunas iguais */
.hosp-datas { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px 16px; margin-bottom: 6px; }
.hosp-label { font-size: 10px; color: #888; margin-bottom: 1px; }
.hosp-val { font-size: 12px; color: #222; font-weight: 600; }
.hosp-incluso {
  margin-top: 8px; padding: 7px 10px;
  background: #fff8ee; border-radius: 5px;
  border-left: 3px solid #c8860a;
}
.hosp-incluso-titulo { font-size: 10px; font-weight: 700; color: #c8860a; margin-bottom: 3px; }
.hosp-incluso p { font-size: 11px; color: #333; line-height: 1.7; white-space: pre-wrap; }

/* pagamento */
.bloco-pag .bloco-titulo { color: var(--r-primary, #1a3a5c); }
.bloco-pag p { font-size: 12px; color: #333; white-space: pre-wrap; }

.rec-footer {
  margin-top: 20px; padding-top: 12px;
  border-top: 1px solid #d0d8e4;
  font-size: 10px; color: #aaa; text-align: center;
}

/* ─── MODO CELULAR ─── */
#recibo.modo-celular {
  width: 390px !important;
  padding: 20px 16px !important;
  font-size: 14px !important;
}

#recibo.modo-celular .rec-header {
  flex-direction: column; align-items: flex-start; gap: 12px;
}
#recibo.modo-celular #logo-img-wrap img,
#recibo.modo-celular #logo-img-wrap .logo-ph {
  width: 52px; height: 52px;
}
#recibo.modo-celular .rec-company h1 { font-size: 16px; }
#recibo.modo-celular .rec-slogan { font-size: 10px; }
#recibo.modo-celular .rec-cnpj { text-align: left; margin-top: 4px; }

#recibo.modo-celular .bloco {
  padding: 12px 14px; margin-bottom: 10px; border-radius: 10px;
}
#recibo.modo-celular .bloco-titulo { font-size: 13px; }
#recibo.modo-celular .bloco p { font-size: 14px; line-height: 1.7; }
#recibo.modo-celular .bloco-pass p { font-size: 15px; font-weight: 600; }

#recibo.modo-celular .bloco-loc { padding: 14px 16px !important; }
#recibo.modo-celular .bloco-loc .loc-esp-val { font-size: 18px !important; }
#recibo.modo-celular .bloco-loc .cia-val { font-size: 14px !important; }

#recibo.modo-celular .trecho {
  padding: 14px 14px; border-radius: 10px; margin-bottom: 10px;
}
#recibo.modo-celular .trecho-titulo { font-size: 15px; }
#recibo.modo-celular .loc-esp-bloco { padding: 8px 14px; }
#recibo.modo-celular .loc-esp-val { font-size: 15px !important; }
#recibo.modo-celular .cia-bloco { padding: 8px 14px; }
#recibo.modo-celular .cia-val { font-size: 14px !important; }

#recibo.modo-celular .trecho-cols {
  grid-template-columns: 1fr; gap: 12px;
}
#recibo.modo-celular .tcol-header { font-size: 11px; }
#recibo.modo-celular .trow-label { font-size: 11px; }
#recibo.modo-celular .trow-val { font-size: 15px; }

#recibo.modo-celular .tbot-label { font-size: 11px; }
#recibo.modo-celular .tbot-val { font-size: 14px; }

#recibo.modo-celular .bag-esp { padding: 10px 13px; }
#recibo.modo-celular .bag-esp-titulo { font-size: 11px; }
#recibo.modo-celular .bag-esp li { font-size: 13px; line-height: 1.9; }

#recibo.modo-celular .bloco-bag li { font-size: 14px; line-height: 2; }
#recibo.modo-celular .bloco-info p { font-size: 13px; line-height: 1.8; }

#recibo.modo-celular .valor-num { font-size: 22px; }
#recibo.modo-celular .bloco-pag p { font-size: 14px; line-height: 1.8; }

#recibo.modo-celular .rec-footer { font-size: 11px; }

/* ─── PRINT ─── */
@media print {
  html, body { background: #fff !important; margin: 0 !important; padding: 0 !important; }
  .sidebar { display: none !important; }
  .app { display: block !important; }
  .preview-area { background: #fff !important; padding: 0 !important; overflow: visible !important; }
  #recibo { width: 100% !important; padding: 16px 20px !important; border-radius: 0 !important; box-shadow: none !important; }
  .bloco, .trecho, .hospedagem { break-inside: avoid !important; page-break-inside: avoid !important; }

  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }

  /* Forçar cores dos elementos escuros explicitamente */
  .bloco-loc,
  .loc-esp-bloco,
  .hosp-conf { background-color: #1e3f6e !important; }

  .loc-esp-val,
  .hosp-conf-val,
  .cia-val { color: #ffffff !important; }

  .loc-esp-label,
  .hosp-conf-label,
  .cia-label { color: rgba(255,255,255,0.6) !important; }

  .bloco-valor { background-color: #1a3a5c !important; }
  .valor-num { color: #ffffff !important; }
  .bloco-valor .bloco-titulo { color: rgba(255,255,255,0.7) !important; }

  @page { margin: 1cm; size: 21cm auto; }
}
</style>
</head>
<body>
<div class="app">

<!-- ═══ SIDEBAR ═══ -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div style="width:32px;height:32px;background:linear-gradient(135deg,#1a3a5c,#e8a020);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;text-align:center;line-height:1.2;">K&V</div>
    <div><span>K&V Easy Traveling</span><small>Gerador de Recibo</small></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('dados')">Dados</button>
    <button class="tab" onclick="showTab('config')">Config</button>
  </div>

  <!-- FORMAT TOGGLE -->
  <div style="display:flex;gap:4px;">

<script>
// ═══ AUTO RESIZE TEXTAREA ═══
// Faz a textarea crescer conforme o usuário cola texto
// scrollHeight = altura total do conteúdo interno
function autoResize(el) {
  el.style.height = 'auto';         // reseta para recalcular
  el.style.height = el.scrollHeight + 'px'; // aplica altura real do conteúdo
}

// ═══ STATE ═══
let D = { passageiros: [], locGeral: '', ciaGeral: '', trechos: [], bagGeral: [], informacoes: '', valor: '', pagamento: [] };
let formato = 'pdf'; // 'pdf' | 'celular'

function setFormato(f) {
  formato = f;
  const recibo = document.getElementById('recibo');
  if (f === 'celular') {
    recibo.classList.add('modo-celular');
    document.getElementById('fmt-cel').classList.add('active');
    document.getElementById('fmt-pdf').classList.remove('active');
  } else {
    recibo.classList.remove('modo-celular');
    document.getElementById('fmt-pdf').classList.add('active');
    document.getElementById('fmt-cel').classList.remove('active');
  }
}

// ═══ CONFIG ═══
const CFG_DEFAULT = {
  nome: 'K&V  Easy Traveling',
  slogan: '✨ "Viaje hoje, viaje barato, viaje sempre" ✨',
  tel: '📱 (38) 9 8815-5417',
  cnpj: '65.597.589/0001-00',
  rodape: 'Recibo gerado pela K&V Easy Traveling  |  Informações CANVAS',
  primary: '#1a3a5c',
  loc: '#1e3f6e',
  bagBg: '#fff8ee',
  bagAccent: '#c8860a',
  infoBg: '#f0f7ff',
  infoBorder: '#b0cff5',
  bagEspBg: '#f0f4fa',
  bagEspBorder: '#1a3a5c',
  logo: null
};

function loadConfig() {
  try {
    const saved = localStorage.getItem('kv-config');
    if (saved) return { ...CFG_DEFAULT, ...JSON.parse(saved) };
  } catch(e) {}
  return { ...CFG_DEFAULT };
}

function saveConfig() {
  const cfg = getCurrentConfig();
  localStorage.setItem('kv-config', JSON.stringify(cfg));
  showMsg('✓ Configuração salva!', 'ok');
}

function resetConfig() {
  localStorage.removeItem('kv-config');
  applyConfigFromObj(CFG_DEFAULT);
  loadConfigToForm(CFG_DEFAULT);
  showMsg('↺ Configuração restaurada', 'ok');
}

function getCurrentConfig() {
  return {
    nome: document.getElementById('cfg-nome').value,
    slogan: document.getElementById('cfg-slogan').value,
    tel: document.getElementById('cfg-tel').value,
    cnpj: document.getElementById('cfg-cnpj').value,
    rodape: document.getElementById('cfg-rodape').value,
    primary: document.getElementById('c-primary').value,
    loc: document.getElementById('c-loc').value,
    bagBg: document.getElementById('c-bag-bg').value,
    bagAccent: document.getElementById('c-bag-accent').value,
    infoBg: document.getElementById('c-info-bg').value,
    infoBorder: document.getElementById('c-info-border').value,
    bagEspBg: document.getElementById('c-bagesp-bg').value,
    bagEspBorder: document.getElementById('c-bagesp-border').value,
    logo: document.getElementById('logo-img-wrap').querySelector('img')?.src || null
  };
}

function loadConfigToForm(cfg) {
  document.getElementById('cfg-nome').value = cfg.nome;
  document.getElementById('cfg-slogan').value = cfg.slogan;
  document.getElementById('cfg-tel').value = cfg.tel;
  document.getElementById('cfg-cnpj').value = cfg.cnpj;
  document.getElementById('cfg-rodape').value = cfg.rodape;
  document.getElementById('c-primary').value = cfg.primary;
  document.getElementById('c-loc').value = cfg.loc;
  document.getElementById('c-bag-bg').value = cfg.bagBg;
  document.getElementById('c-bag-accent').value = cfg.bagAccent;
  document.getElementById('c-info-bg').value = cfg.infoBg;
  document.getElementById('c-info-border').value = cfg.infoBorder;
  document.getElementById('c-bagesp-bg').value = cfg.bagEspBg || '#f0f4fa';

function applyConfigFromObj(cfg) {
  const r = document.getElementById('recibo');

  r.style.setProperty('--r-bag-bg', cfg.bagBg);
  r.style.setProperty('--r-bag-border', cfg.bagAccent);
  r.style.setProperty('--r-bag-text', cfg.bagAccent);
  r.style.setProperty('--r-info-bg', cfg.infoBg);
  r.style.setProperty('--r-info-border', cfg.infoBorder);
  r.style.setProperty('--r-bag-esp-bg', cfg.bagEspBg || '#f0f4fa');

  document.getElementById('r-nome').textContent = cfg.nome;
  document.getElementById('r-slogan').textContent = cfg.slogan;

  if (cfg.logo) {
    document.getElementById('logo-img-wrap').innerHTML = `<img src="${cfg.logo}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;">`;
  }
}

function applyConfig() { applyConfigFromObj(getCurrentConfig()); }

// ═══ LOGO ═══
function loadLogo(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    document.getElementById('logo-img-wrap').innerHTML = `<img src="${ev.target.result}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;">`;
  };

}

// ═══ PASSAGEIROS ═══
function addPassageiro(nome = '') {
  D.passageiros.push(nome);
  renderPassList();
  update();
}

function removePassageiro(i) {
  D.passageiros.splice(i, 1);
  renderPassList();
  update();
}

function renderPassList() {
  const c = document.getElementById('pass-list');
  c.innerHTML = '';
  D.passageiros.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = 'pass-item';
    d.innerHTML = `<input type="text" value="${esc(p)}" placeholder="Nome do passageiro" oninput="D.passageiros[${i}]=this.value;update()">
      <button onclick="removePassageiro(${i})">✕</button>`;
    c.appendChild(d);
  });
}

// ═══ TABS ═══
function showTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');

// ═══ MSG ═══
function showMsg(t, tp) {
  const el = document.getElementById('msg');
  el.textContent = t; el.className = 'msg ' + tp; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);

// ═══ PARSER ═══
const DELIMITADORES = [
  'Passageiro', 'Localizador Geral', 'Cia A[eé]rea Geral', 'Trecho \\d+',
  'Localizador Específico', 'Cia A[eé]rea Específica',
  'Partida', 'Data Sa[íi]da', 'Hora Sa[íi]da',
  'Destino', 'Data Chegada', 'Hora Chegada', 'Paradas', 'Dura[çc][ãa]o',
  'Bagagem Específica', 'Bagagem Geral',
  'C[oó]digo de Confirma[çc][ãa]o', 'Local', 'Cidade',
  'Data de Entrada', 'Data de Sa[íi]da', 'Incluso',
  'Informa[çc][õo]es?', 'Valor [àa] Pagar', 'Pagamento'
];

function inserirQuebras(raw) {
  let txt = raw;
  const ordem = [
    'Localizador Geral', 'Localizador Específico',
    'Cia A[eé]rea Geral', 'Cia A[eé]rea Específica',
    'C[oó]digo de Confirma[çc][ãa]o',
    'Data de Entrada', 'Hora de Entrada',
    'Data de Sa[íi]da', 'Hora de Sa[íi]da',
    'Data Sa[íi]da', 'Hora Sa[íi]da',
    'Data Chegada', 'Hora Chegada',
    'Bagagem Específica', 'Bagagem Geral',
    'Informa[çc][õo]es?', 'Valor [àa] Pagar',
    'Passageiro', 'Partida', 'Destino', 'Cidade',
    'Paradas', 'Dura[çc][ãa]o Total', 'Dura[çc][ãa]o', 'Pagamento',
    'Incluso', 'Local'
  ];
  ordem.forEach(r => {
    try {
      txt = txt.replace(new RegExp(`(${r}:)`, 'gi'), '\n$1');
    } catch(e) {}
  });
  txt = txt.replace(/(Trecho\s*\d+)(\s|$)/gi, '\n$1\n');
  txt = txt.replace(/(Hospedagem\s*\d*)(?=\s|C[oó]digo|Local|Cidade|Data|$)/gi, '\n$1\n');
  return txt;
}

function parsear() {
  const raw = document.getElementById('paste-input').value.trim();
  if (!raw) { showMsg('Cole algum texto primeiro.', 'err'); return; }

  D = { passageiros: [], locGeral: '', ciaGeral: '', trechos: [], hospedagens: [], bagGeral: [], informacoes: '', valor: '', pagamento: [] };

  const txt = inserirQuebras(raw);
  const linhas = txt.split('\n').map(l => l.trim()).filter(l => l);

  let campoAtual = null;
  let trechoAtual = null;
  let hospAtual = null;
  let bufferMulti = [];

  const isPlaceholder = v => !v || v.includes('Nesse caso') || v === '""';

  function flushBuffer() {
    if (!campoAtual || !bufferMulti.length) return;
    const vals = bufferMulti.filter(l => l);
    if (campoAtual === 'bagEspTrecho' && trechoAtual) trechoAtual.bagEsp.push(...vals);
    else if (campoAtual === 'paradas' && trechoAtual) trechoAtual.paradas.push(...vals);
    else if (campoAtual === 'bagGeral') D.bagGeral.push(...vals);
    else if (campoAtual === 'informacoes') D.informacoes = (D.informacoes ? D.informacoes + '\n' : '') + vals.join('\n');
    else if (campoAtual === 'pagamento') D.pagamento.push(...vals);
    else if (campoAtual === 'hospIncluso' && hospAtual) hospAtual.incluso = vals.join('\n');
    bufferMulti = [];
  }

  function novoTrecho() {
    trechoAtual = { num: D.trechos.length + 1, locEsp: '', ciaEsp: '', partida: '', dataPartida: '', horaPartida: '', destino: '', dataChegada: '', horaChegada: '', paradas: [], duracaoTotal: '', bagEsp: [] };
    D.trechos.push(trechoAtual);
  }

  function novaHospedagem() {
    hospAtual = { num: D.hospedagens.length + 1, codigo: '', local: '', cidade: '', entrada: '', horaEntrada: '', saida: '', horaSaida: '', incluso: '' };
    D.hospedagens.push(hospAtual);
  }

  linhas.forEach(l => {
    if (/^Passageiro:\s*/i.test(l)) {
      flushBuffer(); campoAtual = 'passageiro';
      const v = l.replace(/^Passageiro:\s*/i, '').trim();
      if (v) D.passageiros.push(v);
      return;
    }
    if (/^Localizador Geral:\s*/i.test(l)) { flushBuffer(); campoAtual = 'locGeral'; D.locGeral = l.replace(/^Localizador Geral:\s*/i, '').trim(); return; }
    if (/^Cia A[eé]rea Geral:\s*/i.test(l)) { flushBuffer(); campoAtual = 'ciaGeral'; D.ciaGeral = l.replace(/^Cia A[eé]rea Geral:\s*/i, '').trim(); return; }
    if (/^Trecho\s*\d+\s*$/i.test(l)) { flushBuffer(); novoTrecho(); campoAtual = 'trecho'; hospAtual = null; return; }
    if (/^Hospedagem\s*\d*\s*$/i.test(l)) { flushBuffer(); novaHospedagem(); campoAtual = 'hospedagem'; trechoAtual = null; return; }
    if (/^C[oó]digo de Confirma[çc][ãa]o:\s*/i.test(l)) { flushBuffer(); campoAtual = 'hospCodigo'; if (hospAtual) hospAtual.codigo = l.replace(/^C[oó]digo de Confirma[çc][ãa]o:\s*/i, '').trim(); return; }
    if (/^Local:\s*/i.test(l) && hospAtual) { flushBuffer(); campoAtual = 'hospLocal'; hospAtual.local = l.replace(/^Local:\s*/i, '').trim(); return; }
    if (/^Cidade:\s*/i.test(l)) { flushBuffer(); campoAtual = 'hospCidade'; if (hospAtual) hospAtual.cidade = l.replace(/^Cidade:\s*/i, '').trim(); return; }
    if (/^Data de Entrada:\s*/i.test(l)) { flushBuffer(); campoAtual = 'hospEntrada'; if (hospAtual) hospAtual.entrada = l.replace(/^Data de Entrada:\s*/i, '').trim(); return; }
    if (/^Hora de Entrada:\s*/i.test(l)) { flushBuffer(); campoAtual = 'hospHoraEntrada'; if (hospAtual) hospAtual.horaEntrada = l.replace(/^Hora de Entrada:\s*/i, '').trim(); return; }
    if (/^Data de Sa[íi]da:\s*/i.test(l)) { flushBuffer(); campoAtual = 'hospSaida'; if (hospAtual) hospAtual.saida = l.replace(/^Data de Sa[íi]da:\s*/i, '').trim(); return; }
    if (/^Hora de Sa[íi]da:\s*/i.test(l)) { flushBuffer(); campoAtual = 'hospHoraSaida'; if (hospAtual) hospAtual.horaSaida = l.replace(/^Hora de Sa[íi]da:\s*/i, '').trim(); return; }
    if (/^Incluso:\s*/i.test(l)) {
      flushBuffer(); campoAtual = 'hospIncluso';
      const inline = l.replace(/^Incluso:\s*/i, '').trim();
      if (inline) bufferMulti.push(inline);
      return;
    }
    if (/^Localizador Específico:\s*/i.test(l)) { flushBuffer(); campoAtual = 'locEsp'; if (trechoAtual) trechoAtual.locEsp = l.replace(/^Localizador Específico:\s*/i, '').trim(); return; }
    if (/^Cia A[eé]rea Específica:\s*/i.test(l)) { flushBuffer(); campoAtual = 'ciaEsp'; if (trechoAtual) trechoAtual.ciaEsp = l.replace(/^Cia A[eé]rea Específica:\s*/i, '').trim(); return; }
    if (/^Partida:\s*/i.test(l)) { flushBuffer(); campoAtual = 'partida'; if (trechoAtual) trechoAtual.partida = l.replace(/^Partida:\s*/i, '').trim(); return; }
    if (/^Data Sa[íi]da:\s*/i.test(l)) { flushBuffer(); campoAtual = 'dataPartida'; if (trechoAtual) trechoAtual.dataPartida = l.replace(/^Data Sa[íi]da:\s*/i, '').trim(); return; }
    if (/^Hora Sa[íi]da:\s*/i.test(l)) { flushBuffer(); campoAtual = 'horaPartida'; if (trechoAtual) trechoAtual.horaPartida = l.replace(/^Hora Sa[íi]da:\s*/i, '').trim(); return; }
    if (/^Destino:\s*/i.test(l)) { flushBuffer(); campoAtual = 'destino'; if (trechoAtual) trechoAtual.destino = l.replace(/^Destino:\s*/i, '').trim(); return; }
    if (/^Data Chegada:\s*/i.test(l)) { flushBuffer(); campoAtual = 'dataChegada'; if (trechoAtual) trechoAtual.dataChegada = l.replace(/^Data Chegada:\s*/i, '').trim(); return; }
    if (/^Hora Chegada:\s*/i.test(l)) { flushBuffer(); campoAtual = 'horaChegada'; if (trechoAtual) trechoAtual.horaChegada = l.replace(/^Hora Chegada:\s*/i, '').trim(); return; }
    if (/^Paradas:\s*/i.test(l)) {
      flushBuffer(); campoAtual = 'paradas';
      const inline = l.replace(/^Paradas:\s*/i, '').trim();
      if (inline && trechoAtual) trechoAtual.paradas.push(inline);
      return;
    }
    if (/^Dura[çc][ãa]o Total:\s*/i.test(l)) { flushBuffer(); campoAtual = 'duracaoTotal'; if (trechoAtual) trechoAtual.duracaoTotal = l.replace(/^Dura[çc][ãa]o Total:\s*/i, '').trim(); return; }
    if (/^Dura[çc][ãa]o:\s*/i.test(l)) { flushBuffer(); campoAtual = 'duracaoTotal'; if (trechoAtual) trechoAtual.duracaoTotal = l.replace(/^Dura[çc][ãa]o:\s*/i, '').trim(); return; }
    if (/^Bagagem Específica:\s*/i.test(l)) {
      flushBuffer(); campoAtual = 'bagEspTrecho';
      const inline = l.replace(/^Bagagem Específica:\s*/i, '').trim();
      if (inline && !isPlaceholder(inline)) bufferMulti.push(inline);
      return;
    }
    if (/^Bagagem Geral:\s*/i.test(l)) {
      flushBuffer(); campoAtual = 'bagGeral'; trechoAtual = null;
      const inline = l.replace(/^Bagagem Geral:\s*/i, '').trim();
      if (inline) bufferMulti.push(inline);
      return;
    }
    if (/^Informa[çc][õo]es?:\s*/i.test(l)) {
      flushBuffer(); campoAtual = 'informacoes'; trechoAtual = null;
      const inline = l.replace(/^Informa[çc][õo]es?:\s*/i, '').trim();
      if (inline) bufferMulti.push(inline);
      return;
    }
    if (/^Valor [àa] Pagar:\s*/i.test(l)) { flushBuffer(); campoAtual = 'valor'; trechoAtual = null; D.valor = l.replace(/^Valor [àa] Pagar:\s*/i, '').trim(); return; }
    if (/^Pagamento:\s*/i.test(l)) {
      flushBuffer(); campoAtual = 'pagamento'; trechoAtual = null;
      const inline = l.replace(/^Pagamento:\s*/i, '').trim();
      if (inline) bufferMulti.push(inline);
      return;
    }
    if (['bagEspTrecho', 'bagGeral', 'informacoes', 'pagamento', 'hospIncluso', 'paradas'].includes(campoAtual)) bufferMulti.push(l);
  });
  flushBuffer();

  // limpar placeholders
  D.trechos.forEach(t => {
    t.bagEsp = t.bagEsp.filter(b => !isPlaceholder(b));
    if (isPlaceholder(t.locEsp)) t.locEsp = '';
  });
  if (isPlaceholder(D.locGeral)) D.locGeral = '';

  renderPassList();
  showMsg(`✓ ${D.trechos.length} trecho(s) | ${D.passageiros.length} passageiro(s)`, 'ok');
  update();
}

// ═══ RENDER ═══
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function update() {
  let html = '';

  // Passageiros
  if (D.passageiros.length > 0) {
    const nomes = D.passageiros.filter(p => p.trim());
    if (nomes.length) {
      html += `<div class="bloco bloco-pass"><div class="bloco-titulo">👤 ${nomes.length > 1 ? 'Passageiros' : 'Passageiro'}</div><p>${nomes.map(esc).join('<br>')}</p></div>`;
    }
  }

  // Localizador Geral + Cia Aérea Geral
  if (D.locGeral || D.ciaGeral) {
    html += `<div class="bloco bloco-loc" style="padding:16px 20px;">`;
    html += `<div style="display:flex;justify-content:space-between;align-items:center;">`;
    if (D.locGeral) html += `<div style="display:flex;flex-direction:column;gap:3px;"><span style="font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.08em;font-weight:600;">LOCALIZADOR</span><span style="font-size:22px;font-weight:700;color:#fff;font-family:monospace;letter-spacing:.05em;">${esc(D.locGeral)}</span></div>`;
    if (D.ciaGeral) html += `<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;"><span style="font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.08em;font-weight:600;">CIA AÉREA</span><span style="font-size:16px;font-weight:700;color:#fff;">${esc(D.ciaGeral)}</span></div>`;
    else if (!D.locGeral && D.ciaGeral) html += `<div style="display:flex;flex-direction:column;gap:3px;"><span style="font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.08em;font-weight:600;">CIA AÉREA</span><span style="font-size:22px;font-weight:700;color:#fff;">${esc(D.ciaGeral)}</span></div>`;
    html += `</div></div>`;
  }

  // Trechos
  D.trechos.forEach(t => {
    html += `<div class="trecho"><div class="trecho-titulo">✈️ Trecho ${t.num}</div>`;

    // Linha loc+cia
    const temLoc = t.locEsp, temCia = t.ciaEsp;
    if (temLoc || temCia) {
      html += `<div class="loc-cia-row">`;
      if (temLoc) {
        html += `<div class="loc-esp-bloco"><span class="loc-esp-label">LOCALIZADOR</span><span class="loc-esp-val">${esc(t.locEsp)}</span></div>`;
      }
      if (temCia) {
        html += `<div class="cia-bloco"><span class="cia-label">CIA AÉREA</span><span class="cia-val">${esc(t.ciaEsp)}</span></div>`;
      }
      html += `</div>`;
    }

    // Grid duas colunas: Partida | Destino
    html += `<div class="trecho-cols">`;

    // coluna partida
    html += `<div class="tcol"><div class="tcol-header">Partida</div>`;
    if (t.partida) html += `<div class="trow"><div class="trow-label">Local</div><div class="trow-val">${esc(t.partida)}</div></div>`;
    if (t.dataPartida) html += `<div class="trow"><div class="trow-label">Data</div><div class="trow-val">${esc(t.dataPartida)}</div></div>`;
    if (t.horaPartida) html += `<div class="trow"><div class="trow-label">Hora</div><div class="trow-val">${esc(t.horaPartida)}</div></div>`;
    html += `</div>`;

    // coluna destino
    html += `<div class="tcol"><div class="tcol-header">Destino</div>`;
    if (t.destino) html += `<div class="trow"><div class="trow-label">Local</div><div class="trow-val">${esc(t.destino)}</div></div>`;
    if (t.dataChegada) html += `<div class="trow"><div class="trow-label">Data</div><div class="trow-val">${esc(t.dataChegada)}</div></div>`;
    if (t.horaChegada) html += `<div class="trow"><div class="trow-label">Hora</div><div class="trow-val">${esc(t.horaChegada)}</div></div>`;
    html += `</div>`;

    html += `</div>`; // fim trecho-cols

    // inferior: Paradas com duração por parada + Duração Total + Bagagem
    const temBottom = t.paradas.length || t.duracaoTotal || t.bagEsp.length;
    if (temBottom) {
      html += `<div class="trecho-bottom">`;

      if (t.paradas.length) {
        // verificar se é voo direto (sem " - ")
        const temDurPorParada = t.paradas.some(p => p.includes(' - '));

        if (temDurPorParada) {
          // cabeçalho
          html += `<div class="tbot-header">
            <span class="tbot-header-label">Paradas</span>
            <span class="tbot-header-label">Duração</span>
          </div>`;
          // linhas: "São Paulo GRU - 2h10m" → split em " - "
          t.paradas.forEach(p => {
            const parts = p.split(/\s*-\s*(?=\d)/); // split antes de número (duração)
            const local = parts[0] ? parts[0].trim() : p;
            const dur   = parts[1] ? parts[1].trim() : '';
            html += `<div class="tbot-parada-row">
              <span class="tbot-parada-local">${esc(local)}</span>
              <span class="tbot-parada-dur">${esc(dur)}</span>
            </div>`;
          });
        } else {
          // voo direto ou sem duração por parada
          html += `<div class="tbot-item"><div class="tbot-label">Paradas</div><div class="tbot-val">${t.paradas.map(esc).join(' · ')}</div></div>`;
        }
      }

      if (t.duracaoTotal) {
        html += `<div class="tbot-total">
          <span class="tbot-total-label">Duração Total da Viagem</span>
          <span class="tbot-total-val">${esc(t.duracaoTotal)}</span>
        </div>`;
      }

      if (t.bagEsp.length) {
        html += `<div class="bag-esp" style="margin-top:8px;"><div class="bag-esp-titulo">🧳 Bagagem</div><ul>${t.bagEsp.map(b => `<li>${esc(b)}</li>`).join('')}</ul></div>`;
      }

      html += `</div>`;
    }

    html += `</div>`; // fim trecho
  });

  // Bagagem Geral
  if (D.bagGeral.length) {
    html += `<div class="bloco bloco-bag"><div class="bloco-titulo">🧳 Franquia de Bagagens: (por passageiro)</div><ul>${D.bagGeral.map(b => `<li>${esc(b)}</li>`).join('')}</ul></div>`;
  }

  // Hospedagens (acima de informações)
  D.hospedagens.forEach((h, i) => {
    const titulo = D.hospedagens.length > 1 ? `🏨 Hospedagem ${i + 1}` : '🏨 Hospedagem';
    html += `<div class="hospedagem">`;
    html += `<div class="hosp-titulo">${titulo}</div>`;
    if (h.codigo) html += `<div class="hosp-conf"><span class="hosp-conf-label">CONFIRMAÇÃO</span><span class="hosp-conf-val">${esc(h.codigo)}</span></div>`;
    html += `<div class="hosp-grid">`;
    if (h.local)   html += `<div class="hosp-item hosp-full"><div class="hosp-label">Local</div><div class="hosp-val">${esc(h.local)}</div></div>`;
    if (h.cidade)  html += `<div class="hosp-item hosp-full"><div class="hosp-label">Cidade</div><div class="hosp-val">${esc(h.cidade)}</div></div>`;
    html += `</div>`;
    if (h.entrada || h.saida) {
      html += `<div class="hosp-datas">`;
      html += `<div class="hosp-item">`;
      if (h.entrada) html += `<div class="hosp-label">Entrada</div><div class="hosp-val">${esc(h.entrada)}</div>`;
      if (h.horaEntrada) html += `<div class="hosp-label" style="margin-top:3px;">Hora</div><div class="hosp-val">${esc(h.horaEntrada)}</div>`;
      html += `</div>`;
      html += `<div class="hosp-item">`;
      if (h.saida) html += `<div class="hosp-label">Saída</div><div class="hosp-val">${esc(h.saida)}</div>`;
      if (h.horaSaida) html += `<div class="hosp-label" style="margin-top:3px;">Hora</div><div class="hosp-val">${esc(h.horaSaida)}</div>`;
      html += `</div>`;
      html += `</div>`;
    }
    if (h.incluso) html += `<div class="hosp-incluso"><div class="hosp-incluso-titulo">✓ Incluso</div><p>${esc(h.incluso)}</p></div>`;
    html += `</div>`;
  });

  // Informações
  if (D.informacoes) {
    html += `<div class="bloco bloco-info"><div class="bloco-titulo">📋 Informações</div><p>${esc(D.informacoes)}</p></div>`;
  }

  // Valor
  if (D.valor) {
    html += `<div class="bloco bloco-valor"><div class="bloco-titulo">💰 Valor à Pagar</div><div class="valor-num">${esc(D.valor)}</div></div>`;
  }

  // Pagamento
  if (D.pagamento.length) {
    html += `<div class="bloco bloco-pag"><div class="bloco-titulo">💳 Pagamento</div><p>${D.pagamento.map(esc).join('\n')}</p></div>`;
  }

  document.getElementById('r-corpo').innerHTML = html;
}

window.addEventListener('load', () => {
  // Carregar config salva
  const cfg = loadConfig();
  loadConfigToForm(cfg);
  applyConfigFromObj(cfg);

  // Dados via URL
  const params = new URLSearchParams(window.location.search);
  const dados = params.get('dados');
  if (dados) {
    try {
      document.getElementById('paste-input').value = decodeURIComponent(dados);
      parsear();
    } catch(e) {}
  } else {
    update();
  }
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
function copiarLink() {
  const texto = document.getElementById('paste-input').value.trim();
  if (!texto) { showMsg('Cole os dados primeiro.', 'err'); return; }
  const url = window.location.origin + window.location.pathname + '?dados=' + encodeURIComponent(texto);
  navigator.clipboard.writeText(url).then(() => {
    showMsg('✓ Link copiado!', 'ok');
  }).catch(() => {
    // fallback para navegadores sem clipboard API
    const el = document.createElement('textarea');
    el.value = url;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showMsg('✓ Link copiado!', 'ok');
  });
}

function limparTudo() {
  if (!confirm('Limpar todos os dados do recibo?')) return;
  D = { passageiros: [], locGeral: '', ciaGeral: '', trechos: [], hospedagens: [], bagGeral: [], informacoes: '', valor: '', pagamento: [] };
  document.getElementById('paste-input').value = '';
  autoResize(document.getElementById('paste-input'));
  document.getElementById('f-pass').value = '';
  renderPassList();
  update();
  showMsg('↺ Dados limpos', 'ok');
}

async function exportarPDF() {
  const btn = document.querySelector('.btn-export');
  const original = btn.textContent;
  btn.textContent = 'Gerando PDF...';
  btn.disabled = true;

  try {
    const recibo = document.getElementById('recibo');
    await document.fonts.ready;

    const canvas = await html2canvas(recibo, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
    });

    const imgData = canvas.toDataURL('image/png');

    const pxToMm = 0.264583;
    const larguraMm = formato === 'celular' ? 103 : 210;
    const alturaCanvas = canvas.height / 2;
    const larguraCanvas = canvas.width / 2;
    const ratio = larguraMm / (larguraCanvas * pxToMm);
    const alturaMm = alturaCanvas * pxToMm * ratio;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({
      orientation: 'portrait',
      unit: 'mm',
      format: [larguraMm, alturaMm]
    });

    doc.addImage(imgData, 'PNG', 0, 0, larguraMm, alturaMm);

    const partes = ['Recibo K&V'];
    if (D.locGeral) partes.push(D.locGeral.trim());
    D.trechos.forEach(t => { if (t.locEsp) partes.push(t.locEsp.trim()); });
    const nomeArquivo = partes.join(' - ').replace(/[\/\\:*?"<>|]/g, '').trim();
    doc.save(`${nomeArquivo}.pdf`);

  } catch(e) {
    alert('Erro ao gerar PDF: ' + e.message);
  }

  btn.textContent = original;
  btn.disabled = false;
}
</script>
