
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0f1923;color:#e0e8f0;}
.app{display:flex;min-height:600px;}

/* SIDEBAR ESCURA */
.sidebar{width:300px;min-width:300px;background:#151f2b;border-right:1px solid #1e2e40;padding:1.1rem;display:flex;flex-direction:column;gap:.8rem;overflow-y:auto;max-height:700px;}
.sidebar h2{font-size:11px;font-weight:500;color:#7a9ab5;text-transform:uppercase;letter-spacing:.08em;padding-bottom:7px;border-bottom:1px solid #1e2e40;}
.paste-box{border:1.5px dashed #2a4a6a;border-radius:8px;padding:10px;background:#1a2635;}
.paste-box label{font-size:11px;color:#5a9fd4;display:block;margin-bottom:5px;font-weight:500;}
.paste-box textarea{font-size:11px;min-height:110px;border:1px solid #1e2e40;border-radius:5px;background:#0f1923;color:#c8d8e8;width:100%;padding:6px 8px;font-family:monospace;resize:vertical;}
.parse-btn{margin-top:6px;width:100%;padding:8px;font-size:12px;border:none;border-radius:6px;background:#1a5ca8;color:#fff;cursor:pointer;font-weight:500;}
.parse-btn:hover{background:#1470c8;}
.msg{font-size:11px;margin-top:5px;padding:5px 8px;border-radius:5px;display:none;}
.msg.ok{background:#1a3a1a;color:#6fcf6f;}
.msg.err{background:#3a1a1a;color:#cf6f6f;}
.fl{display:flex;flex-direction:column;gap:4px;}
.fl label{font-size:11px;color:#7a9ab5;}
.fl input{font-size:12px;padding:6px 8px;border:1px solid #1e2e40;border-radius:6px;background:#1a2635;color:#e0e8f0;width:100%;}
.logo-btn{font-size:11px;background:none;border:1px dashed #2a4a6a;border-radius:6px;padding:7px;cursor:pointer;color:#7a9ab5;text-align:center;width:100%;}
.expbtn{background:#1a5ca8;color:#fff;border:none;border-radius:7px;padding:11px;font-size:13px;font-weight:500;cursor:pointer;width:100%;margin-top:auto;}
.expbtn:hover{background:#1470c8;}

.preview-area{flex:1;padding:1.5rem;overflow-y:auto;max-height:700px;background:#0a1018;display:flex;flex-direction:column;align-items:center;}

/* RECIBO — mantém branco para impressão */
#recibo{width:650px;background:#fff;color:#111;font-family:'Segoe UI',Arial,sans-serif;font-size:13px;padding:28px 32px;border-radius:8px;}
.rec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:13px;border-bottom:2.5px solid #1a3a5c;}
.rec-logo-area{display:flex;align-items:center;gap:12px;}
.logo-ph{width:68px;height:68px;background:linear-gradient(135deg,#1a3a5c 60%,#e8a020 100%);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700;text-align:center;line-height:1.4;}
.rec-company h1{font-size:18px;font-weight:700;color:#1a3a5c;}
.rec-slogan{font-size:10px;color:#555;margin-top:3px;border:.5px solid #ccc;border-radius:4px;padding:2px 7px;display:inline-block;}
.rec-tel{font-size:10px;color:#888;margin-top:3px;}
.rec-cnpj{text-align:right;font-size:11px;color:#555;}
.rec-cnpj strong{color:#1a3a5c;font-size:12px;display:block;}
.bloco{border:1px solid #d0d8e4;border-radius:7px;padding:10px 14px;margin-bottom:11px;background:#f7f9fc;break-inside:avoid;page-break-inside:avoid;}
.bloco-titulo{font-weight:700;font-size:13px;color:#1a3a5c;margin-bottom:5px;display:flex;align-items:center;gap:6px;}
.bloco p{color:#333;font-size:12px;line-height:1.8;}
.bloco-loc{background:#1e3f6e;border-color:#1e3f6e;}
.bloco-loc .bloco-titulo{color:#fff;}
.bloco-loc p{color:#c8d8f0;font-size:13px;font-weight:600;}
.trecho{background:#fff;border:1px solid #d0d8e4;border-radius:7px;padding:10px 14px;margin-bottom:11px;break-inside:avoid;page-break-inside:avoid;}
.trecho-titulo{font-weight:700;font-size:13px;color:#1a3a5c;display:flex;align-items:center;gap:6px;margin-bottom:7px;padding-bottom:6px;border-bottom:1px solid #e8eef5;}
.trecho-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;margin-bottom:6px;}
.tg-label{font-size:10px;color:#888;margin-bottom:1px;}
.tg-val{font-size:12px;color:#222;font-weight:500;}
.tg-full{grid-column:1/-1;}
.bag-esp{margin-top:8px;padding:7px 10px;background:#f0f4fa;border-radius:5px;border-left:3px solid #1a3a5c;}
.bag-esp-titulo{font-size:10px;font-weight:700;color:#1a3a5c;margin-bottom:3px;}
.bag-esp ul{list-style:none;}
.bag-esp li{font-size:11px;color:#333;line-height:1.7;}
.bag-esp li::before{content:"✓ ";color:#1a3a5c;font-weight:700;}
.bloco-bag{background:#fff8ee;border-color:#e8c97a;}
.bloco-bag .bloco-titulo{color:#8a6000;}
.bloco-bag ul{list-style:none;}
.bloco-bag li{font-size:12px;color:#333;line-height:1.8;}
.bloco-bag li::before{content:"✓ ";color:#8a6000;font-weight:700;}
.bloco-info{background:#f0f7ff;border-color:#b0cff5;}
.bloco-info .bloco-titulo{color:#1a3a5c;}
.bloco-info p{white-space:pre-wrap;font-size:12px;color:#333;line-height:1.75;}
.bloco-valor{background:#1a3a5c;border-color:#1a3a5c;display:flex;justify-content:space-between;align-items:center;}
.bloco-valor .bloco-titulo{color:#fff;margin-bottom:0;}
.valor-num{font-size:22px;font-weight:700;color:#fff;}
.bloco-pag .bloco-titulo{color:#1a3a5c;}
.bloco-pag p{font-size:12px;color:#333;white-space:pre-wrap;}
.rec-footer{margin-top:18px;padding-top:10px;border-top:1px solid #d0d8e4;font-size:10px;color:#aaa;text-align:center;}

@media print{
  html,body{background:#fff!important;margin:0!important;padding:0!important;}
  .sidebar{display:none!important;}
  .app{display:block!important;}
  .preview-area{background:#fff!important;padding:0!important;max-height:none!important;overflow:visible!important;}
  #recibo{width:100%!important;padding:16px 20px!important;border-radius:0!important;}
  .bloco,.trecho{break-inside:avoid!important;page-break-inside:avoid!important;}
  @page{margin:1.2cm;size:A4 portrait;}
}
</style>

<div class="app">
<div class="sidebar">
  <h2>K&V — Gerador de Recibo</h2>
  <div class="paste-box">
    <label>📋 Cole os dados do Coda aqui</label>
    <textarea id="paste-input" placeholder="Cole o texto exportado do Canvas..."></textarea>
    <button class="parse-btn" onclick="parsear()">Gerar recibo ↗</button>
    <div class="msg" id="msg"></div>
  </div>
  <div class="fl">
    <label>Ajuste — Passageiro</label>
    <input id="f-pass" oninput="update()" placeholder="Nome do passageiro">
  </div>
  <button class="logo-btn" onclick="document.getElementById('logo-file').click()">
    📷 Trocar logo da empresa
    <input type="file" id="logo-file" accept="image/*" style="display:none" onchange="loadLogo(event)">
  </button>
  <button class="expbtn" onclick="window.print()">Exportar PDF</button>
</div>

<div class="preview-area">
<div id="recibo">
  <div class="rec-header">
    <div class="rec-logo-area">
      <div id="logo-wrap"><div class="logo-ph">K&V<br>Viagens</div></div>
      <div class="rec-company">
        <h1>K&amp;V&nbsp; Easy Traveling</h1>
        <div class="rec-slogan">✨ "Viaje hoje, viaje barato, viaje sempre" ✨</div>
        <div class="rec-tel">📱 (38) 9 8815-5417</div>
      </div>
    </div>
    <div class="rec-cnpj">CNPJ:<strong>65.597.589/0001-00</strong></div>
  </div>
  <div id="r-corpo"></div>
  <div class="rec-footer">Recibo gerado pela K&amp;V Easy Traveling &nbsp;|&nbsp; Informações CANVAS</div>
</div>
</div>
</div>

<script>
let D={passageiro:'',locGeral:'',trechos:[],bagGeral:[],informacoes:'',valor:'',pagamento:[]};

function loadLogo(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{document.getElementById('logo-wrap').innerHTML=`<img src="${ev.target.result}" style="width:68px;height:68px;object-fit:cover;border-radius:7px;">`};
  r.readAsDataURL(f);
}

function showMsg(t,tp){const el=document.getElementById('msg');el.textContent=t;el.className='msg '+tp;el.style.display='block';}

// Todos os rótulos que servem como "delimitadores" de campo
const DELIMITADORES=[
  {re:/^Passageiro:\s*/i,         key:'passageiro'},
  {re:/^Localizador Geral:\s*/i,  key:'locGeral'},
  {re:/^Trecho\s*(\d+)/i,         key:'trecho'},
  {re:/^Localizador Específico:\s*/i, key:'locEsp'},
  {re:/^Partida:\s*/i,            key:'partida'},
  {re:/^Data Partida:\s*/i,       key:'dataPartida'},
  {re:/^Hora Partida:\s*/i,       key:'horaPartida'},
  {re:/^Destino:\s*/i,            key:'destino'},
  {re:/^Data Chegada:\s*/i,       key:'dataChegada'},
  {re:/^Hora Chegada:\s*/i,       key:'horaChegada'},
  {re:/^Paradas:\s*/i,            key:'paradas'},
  {re:/^Dura[çc][ãa]o:\s*/i,     key:'duracao'},
  {re:/^Bagagem Específica:\s*/i, key:'bagEsp'},
  {re:/^Bagagem Geral:\s*/i,      key:'bagGeral'},
  {re:/^Informa[çc][õo]es?:\s*/i,key:'informacoes'},
  {re:/^Valor [àa] Pagar:\s*/i,   key:'valor'},
  {re:/^Pagamento:\s*/i,          key:'pagamento'},
];

function inserirQuebras(raw){
  // Insere \n antes de cada rótulo conhecido para garantir separação mesmo sem quebras
  let txt=raw;
  DELIMITADORES.forEach(({re})=>{
    // pega o rótulo sem o \s* do fim
    const src=re.source.replace(/\^\s*/,'').replace(/\\s\*$/,'');
    try{
      const r=new RegExp(`(${src})`,'gi');
      txt=txt.replace(r,'\n$1');
    }catch(e){}
  });
  // "Trecho N" sem dois pontos
  txt=txt.replace(/(Trecho\s*\d+)(\s)/gi,'\n$1\n');
  return txt;
}

function parsear(){
  const raw=document.getElementById('paste-input').value.trim();
  if(!raw){showMsg('Cole algum texto primeiro.','err');return;}

  D={passageiro:'',locGeral:'',trechos:[],bagGeral:[],informacoes:'',valor:'',pagamento:[]};

  const txt=inserirQuebras(raw);
  const linhas=txt.split('\n').map(l=>l.trim()).filter(l=>l);

  // Tokenizar: percorrer linha a linha e identificar o campo atual
  let campoAtual=null;
  let trechoAtual=null;
  let bufferMulti=[];   // para campos multilinhas (bagagem, info, pagamento)

  function flushBuffer(){
    if(!campoAtual||!bufferMulti.length)return;
    const vals=bufferMulti.filter(l=>l);
    if(campoAtual==='bagEspTrecho'&&trechoAtual){
      trechoAtual.bagEsp.push(...vals);
    } else if(campoAtual==='bagGeral'){
      D.bagGeral.push(...vals);
    } else if(campoAtual==='informacoes'){
      D.informacoes=(D.informacoes?D.informacoes+'\n':'')+vals.join('\n');
    } else if(campoAtual==='pagamento'){
      D.pagamento.push(...vals);
    }
    bufferMulti=[];
  }

  function novoTrecho(){
    trechoAtual={num:D.trechos.length+1,locEsp:'',partida:'',dataPartida:'',horaPartida:'',destino:'',dataChegada:'',horaChegada:'',paradas:'',duracao:'',bagEsp:[]};
    D.trechos.push(trechoAtual);
  }

  linhas.forEach(l=>{
    // Verificar se é um rótulo delimitador
    if(/^Passageiro:\s*/i.test(l)){
      flushBuffer();campoAtual='passageiro';
      D.passageiro=l.replace(/^Passageiro:\s*/i,'').trim();return;
    }
    if(/^Localizador Geral:\s*/i.test(l)){
      flushBuffer();campoAtual='locGeral';
      D.locGeral=l.replace(/^Localizador Geral:\s*/i,'').trim();return;
    }
    if(/^Trecho\s*\d+\s*$/i.test(l)){
      flushBuffer();novoTrecho();campoAtual='trecho';return;
    }
    if(/^Localizador Específico:\s*/i.test(l)){
      flushBuffer();campoAtual='locEsp';
      if(trechoAtual)trechoAtual.locEsp=l.replace(/^Localizador Específico:\s*/i,'').trim();return;
    }
    if(/^Partida:\s*/i.test(l)){
      flushBuffer();campoAtual='partida';
      if(trechoAtual)trechoAtual.partida=l.replace(/^Partida:\s*/i,'').trim();return;
    }
    if(/^Data Partida:\s*/i.test(l)){
      flushBuffer();campoAtual='dataPartida';
      if(trechoAtual)trechoAtual.dataPartida=l.replace(/^Data Partida:\s*/i,'').trim();return;
    }
    if(/^Hora Partida:\s*/i.test(l)){
      flushBuffer();campoAtual='horaPartida';
      if(trechoAtual)trechoAtual.horaPartida=l.replace(/^Hora Partida:\s*/i,'').trim();return;
    }
    if(/^Destino:\s*/i.test(l)){
      flushBuffer();campoAtual='destino';
      if(trechoAtual)trechoAtual.destino=l.replace(/^Destino:\s*/i,'').trim();return;
    }
    if(/^Data Chegada:\s*/i.test(l)){
      flushBuffer();campoAtual='dataChegada';
      if(trechoAtual)trechoAtual.dataChegada=l.replace(/^Data Chegada:\s*/i,'').trim();return;
    }
    if(/^Hora Chegada:\s*/i.test(l)){
      flushBuffer();campoAtual='horaChegada';
      if(trechoAtual)trechoAtual.horaChegada=l.replace(/^Hora Chegada:\s*/i,'').trim();return;
    }
    if(/^Paradas:\s*/i.test(l)){
      flushBuffer();campoAtual='paradas';
      if(trechoAtual)trechoAtual.paradas=l.replace(/^Paradas:\s*/i,'').trim();return;
    }
    if(/^Dura[çc][ãa]o:\s*/i.test(l)){
      flushBuffer();campoAtual='duracao';
      if(trechoAtual)trechoAtual.duracao=l.replace(/^Dura[çc][ãa]o:\s*/i,'').trim();return;
    }
    if(/^Bagagem Específica:\s*/i.test(l)){
      flushBuffer();campoAtual='bagEspTrecho';
      const inline=l.replace(/^Bagagem Específica:\s*/i,'').trim();
      if(inline)bufferMulti.push(inline);return;
    }
    if(/^Bagagem Geral:\s*/i.test(l)){
      flushBuffer();campoAtual='bagGeral';trechoAtual=null;
      const inline=l.replace(/^Bagagem Geral:\s*/i,'').trim();
      if(inline)bufferMulti.push(inline);return;
    }
    if(/^Informa[çc][õo]es?:\s*/i.test(l)){
      flushBuffer();campoAtual='informacoes';trechoAtual=null;
      const inline=l.replace(/^Informa[çc][õo]es?:\s*/i,'').trim();
      if(inline)bufferMulti.push(inline);return;
    }
    if(/^Valor [àa] Pagar:\s*/i.test(l)){
      flushBuffer();campoAtual='valor';trechoAtual=null;
      D.valor=l.replace(/^Valor [àa] Pagar:\s*/i,'').trim();return;
    }
    if(/^Pagamento:\s*/i.test(l)){
      flushBuffer();campoAtual='pagamento';trechoAtual=null;
      const inline=l.replace(/^Pagamento:\s*/i,'').trim();
      if(inline)bufferMulti.push(inline);return;
    }

    // linha de conteúdo — vai para o buffer do campo atual
    if(['bagEspTrecho','bagGeral','informacoes','pagamento'].includes(campoAtual)){
      bufferMulti.push(l);
    }
  });

  flushBuffer();

  // Filtrar placeholders vazios ("Nesse caso não tem...")
  const isPlaceholder=v=>v.includes('Nesse caso não tem')||v==='""'||v==='"Nesse caso não tem, mas caso tivesse estaria aqui"';
  D.trechos.forEach(t=>{
    t.bagEsp=t.bagEsp.filter(b=>!isPlaceholder(b));
    if(isPlaceholder(t.locEsp))t.locEsp='';
  });
  if(D.locGeral&&isPlaceholder(D.locGeral))D.locGeral='';

  document.getElementById('f-pass').value=D.passageiro;
  showMsg(`✓ ${D.trechos.length} trecho(s) | bagagem geral: ${D.bagGeral.length} item(s) | ${D.valor?'valor ✓':'sem valor'}`,'ok');
  update();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function update(){
  const pass=document.getElementById('f-pass').value.trim()||D.passageiro;
  let html='';

  html+=`<div class="bloco"><div class="bloco-titulo">👤 Passageiro</div><p>${esc(pass||'—')}</p></div>`;

  if(D.locGeral){
    html+=`<div class="bloco bloco-loc"><div class="bloco-titulo">➡️ Localizador</div><p>${esc(D.locGeral)}</p></div>`;
  }

  D.trechos.forEach(t=>{
    html+=`<div class="trecho">
      <div class="trecho-titulo">✈️ Trecho ${t.num}</div>
      <div class="trecho-grid">
        ${t.locEsp?`<div class="tg-item tg-full"><div class="tg-label">Localizador</div><div class="tg-val">${esc(t.locEsp)}</div></div>`:''}
        ${t.partida?`<div class="tg-item"><div class="tg-label">Partida</div><div class="tg-val">${esc(t.partida)}</div></div>`:''}
        ${t.destino?`<div class="tg-item"><div class="tg-label">Destino</div><div class="tg-val">${esc(t.destino)}</div></div>`:''}
        ${t.dataPartida?`<div class="tg-item"><div class="tg-label">Data partida</div><div class="tg-val">${esc(t.dataPartida)}</div></div>`:''}
        ${t.horaPartida?`<div class="tg-item"><div class="tg-label">Hora partida</div><div class="tg-val">${esc(t.horaPartida)}</div></div>`:''}
        ${t.dataChegada?`<div class="tg-item"><div class="tg-label">Data chegada</div><div class="tg-val">${esc(t.dataChegada)}</div></div>`:''}
        ${t.horaChegada?`<div class="tg-item"><div class="tg-label">Hora chegada</div><div class="tg-val">${esc(t.horaChegada)}</div></div>`:''}
        ${t.paradas?`<div class="tg-item tg-full"><div class="tg-label">Paradas</div><div class="tg-val">${esc(t.paradas)}</div></div>`:''}
        ${t.duracao?`<div class="tg-item"><div class="tg-label">Duração</div><div class="tg-val">${esc(t.duracao)}</div></div>`:''}
      </div>
      ${t.bagEsp.length?`<div class="bag-esp"><div class="bag-esp-titulo">🧳 Bagagem</div><ul>${t.bagEsp.map(b=>`<li>${esc(b)}</li>`).join('')}</ul></div>`:''}
    </div>`;
  });

  if(D.bagGeral.length){
    html+=`<div class="bloco bloco-bag">
      <div class="bloco-titulo">🧳 Franquia de Bagagens: (por passageiro)</div>
      <ul>${D.bagGeral.map(b=>`<li>${esc(b)}</li>`).join('')}</ul>
    </div>`;
  }

  if(D.informacoes){
    html+=`<div class="bloco bloco-info"><div class="bloco-titulo">📋 Informações</div><p>${esc(D.informacoes)}</p></div>`;
  }

  if(D.valor){
    html+=`<div class="bloco bloco-valor"><div class="bloco-titulo">💰 Valor à Pagar</div><div class="valor-num">${esc(D.valor)}</div></div>`;
  }

  if(D.pagamento.length){
    html+=`<div class="bloco bloco-pag"><div class="bloco-titulo">💳 Pagamento</div><p>${D.pagamento.map(esc).join('\n')}</p></div>`;
  }

  document.getElementById('r-corpo').innerHTML=html;
}

// Ler dados da URL ao carregar (para integração com Coda)
window.addEventListener('load',()=>{
  const params=new URLSearchParams(window.location.search);
  const dados=params.get('dados');
  if(dados){
    try{
      const txt=decodeURIComponent(dados);
      document.getElementById('paste-input').value=txt;
      parsear();
    }catch(e){}
  } else {
    update();
  }
});
</script>
